<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiagnosticAI — Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫁</text></svg>">
<style>
  :root {
    --navy: #0a0f1e; --navy-mid: #111827;
    --blue: #2563eb; --blue-bright: #3b82f6; --blue-glow: #60a5fa;
    --text-primary: #f0f4ff; --text-secondary: #94a3b8; --text-muted: #475569;
    --border: rgba(59,130,246,0.18); --card-bg: rgba(17,24,39,0.85);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy); color: var(--text-primary);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 20px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(37,99,235,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%; max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
    position: relative; z-index: 1;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  }

  .form-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon { width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(37,99,235,0.5); }
  .logo-text { font-size: 20px; font-weight: 600; }
  .logo-text span { color: var(--blue-bright); }

  .icon-wrap {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(37,99,235,0.15);
    border: 2px solid rgba(37,99,235,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 20px;
  }

  .form-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; text-align: center; }
  .form-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; text-align: center; line-height: 1.6; }

  .form-label { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; display: block; }
  .form-input {
    width: 100%; padding: 12px 14px;
    background: rgba(30,45,69,0.6);
    border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 20px;
  }
  .form-input:focus { border-color: var(--blue-bright); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .form-input::placeholder { color: var(--text-muted); }

  .btn-primary {
    width: 100%; padding: 13px;
    background: var(--blue); color: white;
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }

  .btn-ghost {
    width: 100%; padding: 12px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-ghost:hover { border-color: var(--blue-bright); color: var(--text-primary); }

  .success-msg { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #34d399; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; text-align: center; }
  .error-msg   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: #f87171; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  .steps { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
  .step  { display: flex; align-items: center; gap: 12px; font-size: 13px; color: var(--text-secondary); }
  .step-num { width: 24px; height: 24px; border-radius: 50%; background: rgba(37,99,235,0.2); border: 1px solid rgba(37,99,235,0.4); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--blue-glow); flex-shrink: 0; font-family: 'Space Mono', monospace; }
</style>
</head>
<body>

<div class="card">
  <div class="form-logo">
    <div class="logo-icon">🫁</div>
    <div class="logo-text">Diagnostic<span>AI</span></div>
  </div>

  <div class="icon-wrap">🔐</div>
  <h2 class="form-title">Reset Password</h2>
  <p class="form-subtitle">Enter your registered email address to start the Play-Test verification challenge.</p>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <div class="steps">
    <div class="step"><div class="step-num">1</div> Enter your registered email</div>
    <div class="step"><div class="step-num">2</div> Complete the clinical challenge</div>
    <div class="step"><div class="step-num">3</div> Set your new password</div>
  </div>

  <form method="POST" action="/forgot-password">
    <label class="form-label">Registered Email Address</label>
    <input type="email" name="email" class="form-input"
           placeholder="doctor@hospital.com" required>
    <button type="submit" class="btn-primary">🔓 Start Verification</button>
  </form>

  <a href="/login" class="btn-ghost">← Back to Login</a>
</div>

</body>
</html>
