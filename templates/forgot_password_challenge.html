<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiagnosticAI — Verification Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫁</text></svg>">
<style>
  :root {
    --navy: #0a0f1e; --navy-mid: #111827;
    --blue: #2563eb; --blue-bright: #3b82f6; --blue-glow: #60a5fa;
    --text-primary: #f0f4ff; --text-secondary: #94a3b8; --text-muted: #475569;
    --border: rgba(59,130,246,0.18); --card-bg: rgba(17,24,39,0.85);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy); color: var(--text-primary);
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 20px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(37,99,235,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .card {
    width: 100%; max-width: 440px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
    position: relative; z-index: 1;
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  }

  .form-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .logo-icon { width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(37,99,235,0.5); }
  .logo-text { font-size: 20px; font-weight: 600; }
  .logo-text span { color: var(--blue-bright); }

  .icon-wrap {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(37,99,235,0.15);
    border: 2px solid rgba(37,99,235,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 20px;
  }

  .form-title { font-size: 22px; font-weight: 600; margin-bottom: 8px; text-align: center; }
  .form-subtitle { font-size: 13.5px; color: var(--text-secondary); margin-bottom: 28px; text-align: center; line-height: 1.6; }

  /* CHALLENGE GRID */
  .challenge-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .challenge-option {
    background: rgba(30, 45, 69, 0.45);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.22s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .challenge-option:hover {
    border-color: var(--blue-glow);
    background: rgba(59, 130, 246, 0.08);
    transform: translateY(-3px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), 0 0 12px rgba(59, 130, 246, 0.12);
  }
  .option-icon {
    font-size: 36px;
    transition: transform 0.2s;
  }
  .challenge-option:hover .option-icon {
    transform: scale(1.15);
  }
  .option-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }

  .btn-ghost {
    width: 100%; padding: 12px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-ghost:hover { border-color: var(--blue-bright); color: var(--text-primary); }

  .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 12px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 20px; text-align: center; }
  .email-tag { font-family: 'Space Mono', monospace; font-size: 11px; background: rgba(59, 130, 246, 0.12); border: 1px solid rgba(59, 130, 246, 0.25); color: var(--blue-glow); padding: 2px 8px; border-radius: 6px; }
</style>
</head>
<body>

<div class="card">
  <div class="form-logo">
    <div class="logo-icon">🫁</div>
    <div class="logo-text">Diagnostic<span>AI</span></div>
  </div>

  <div class="icon-wrap">🔬</div>
  <h2 class="form-title">Verification Challenge</h2>
  <p class="form-subtitle">
    To unlock password reset for <span class="email-tag">{{ email }}</span>, identify the target organ analyzed by DiagnosticAI:
  </p>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" id="challenge-form">
    <input type="hidden" name="answer" id="challenge-answer">
    <div class="challenge-grid">
      <div class="challenge-option" onclick="submitChallenge('Brain')">
        <span class="option-icon">🧠</span>
        <span class="option-label">Brain</span>
      </div>
      <div class="challenge-option" onclick="submitChallenge('Lungs')">
        <span class="option-icon">🫁</span>
        <span class="option-label">Lungs</span>
      </div>
      <div class="challenge-option" onclick="submitChallenge('Heart')">
        <span class="option-icon">🫀</span>
        <span class="option-label">Heart</span>
      </div>
      <div class="challenge-option" onclick="submitChallenge('Bones')">
        <span class="option-icon">🦴</span>
        <span class="option-label">Bones</span>
      </div>
    </div>
  </form>

  <a href="/login" class="btn-ghost">Cancel Reset</a>
</div>

<script>
function submitChallenge(val) {
  document.getElementById('challenge-answer').value = val;
  document.getElementById('challenge-form').submit();
}
</script>

</body>
</html>
