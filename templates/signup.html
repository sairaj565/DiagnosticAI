<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DiagnosticAI — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫁</text></svg>">
<style>
  :root {
    --navy: #0a0f1e; --navy-mid: #111827; --navy-light: #1e2d45;
    --blue: #2563eb; --blue-bright: #3b82f6; --blue-glow: #60a5fa;
    --cyan: #06b6d4;
    --text-primary: #f0f4ff; --text-secondary: #94a3b8; --text-muted: #475569;
    --border: rgba(59,130,246,0.18); --card-bg: rgba(17,24,39,0.85);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy); color: var(--text-primary);
    min-height: 100vh; display: flex; align-items: center;
    justify-content: center; padding: 40px 20px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 30%, rgba(37,99,235,0.15) 0%, transparent 70%);
    pointer-events: none;
  }

  .signup-card {
    width: 100%; max-width: 560px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 20px; padding: 40px;
    position: relative; z-index: 1;
    backdrop-filter: blur(10px);
    box-shadow: 0 40px 80px rgba(0,0,0,0.4);
  }

  .form-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-icon { width: 40px; height: 40px; background: var(--blue); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; box-shadow: 0 0 20px rgba(37,99,235,0.5); }
  .logo-text { font-size: 20px; font-weight: 600; }
  .logo-text span { color: var(--blue-bright); }

  .form-title { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
  .form-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 28px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .form-group { display: flex; flex-direction: column; }
  .form-group.full { grid-column: 1 / -1; }

  .form-label { font-size: 11px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 7px; }
  .form-input {
    padding: 11px 14px;
    background: rgba(30,45,69,0.6);
    border: 1px solid var(--border);
    border-radius: 10px; color: var(--text-primary);
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  .form-input:focus { border-color: var(--blue-bright); box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
  .form-input::placeholder { color: var(--text-muted); }
  select.form-input option { background: var(--navy-mid); }

  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  .btn-primary {
    width: 100%; padding: 13px;
    background: var(--blue); color: white;
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 600;
    cursor: pointer; margin-bottom: 12px;
    box-shadow: 0 4px 20px rgba(37,99,235,0.4);
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #1d4ed8; transform: translateY(-1px); }

  .btn-ghost {
    width: 100%; padding: 12px;
    background: transparent; color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 10px;
    font-family: 'DM Sans', sans-serif; font-size: 14px;
    cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-ghost:hover { border-color: var(--blue-bright); color: var(--text-primary); }

  .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }

  .strength-bar { height: 4px; border-radius: 2px; background: rgba(30,45,69,0.8); margin-top: 6px; overflow: hidden; }
  .strength-fill { height: 100%; border-radius: 2px; width: 0; transition: width 0.3s, background 0.3s; }

  .terms { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 16px; line-height: 1.6; }
  .terms a { color: var(--blue-bright); text-decoration: none; }

  @media (max-width: 576px) {
    body { padding: 20px 10px; }
    .signup-card { padding: 24px 20px; border-radius: 16px; }
    .form-grid { grid-template-columns: 1fr; gap: 12px; }
    .form-title { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="signup-card">
  <div class="form-logo">
    <div class="logo-icon">🫁</div>
    <div class="logo-text">Diagnostic<span>AI</span></div>
  </div>

  <h2 class="form-title">Create Account</h2>
  <p class="form-subtitle">Register to access the AI diagnostic platform</p>

  {% if error %}
  <div class="error-msg">⚠️ {{ error }}</div>
  {% endif %}

  <form method="POST" action="/signup">
    <div class="form-grid">

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" name="name" class="form-input" placeholder="Dr. Firstname Lastname" required>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" name="email" class="form-input" placeholder="doctor@hospital.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" name="password" id="password" class="form-input"
               placeholder="Min. 8 characters" required onkeyup="checkStrength(this.value)">
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-input" placeholder="Re-enter password" required>
      </div>

      <div class="form-group">
        <label class="form-label">Hospital / Clinic</label>
        <input type="text" name="hospital" class="form-input" placeholder="AIIMS, Apollo, etc.">
      </div>

      <div class="form-group">
        <label class="form-label">Specialization</label>
        <select name="specialization" class="form-input">
          <option value="">Select specialization</option>
          <option>Radiology</option>
          <option>Oncology</option>
          <option>Pulmonology</option>
          <option>General Medicine</option>
          <option>Surgery</option>
          <option>Other</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Phone Number</label>
        <input type="tel" name="phone" class="form-input" placeholder="+91 XXXXX XXXXX">
      </div>

      <div class="form-group">
        <label class="form-label">Medical License No.</label>
        <input type="text" name="license" class="form-input" placeholder="e.g. MCI-12345">
      </div>

    </div>

    <div class="divider"></div>

    <button type="submit" class="btn-primary">Create Account →</button>
  </form>

  <a href="/login" class="btn-ghost">← Back to Login</a>

  <div class="terms">
    By creating an account you agree to our
    <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
  </div>
</div>

<script>
function checkStrength(val) {
  const fill = document.getElementById('strength-fill');
  let strength = 0;
  if (val.length >= 8) strength++;
  if (/[A-Z]/.test(val)) strength++;
  if (/[0-9]/.test(val)) strength++;
  if (/[^A-Za-z0-9]/.test(val)) strength++;

  const colors = ['#ef4444', '#f59e0b', '#3b82f6', '#10b981'];
  const widths  = ['25%', '50%', '75%', '100%'];

  if (val.length === 0) { fill.style.width = '0'; return; }
  fill.style.width      = widths[strength - 1]  || '25%';
  fill.style.background = colors[strength - 1] || '#ef4444';
}
</script>
</body>
</html>
